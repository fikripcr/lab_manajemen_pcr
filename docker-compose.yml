networks:
  mariadb_net:
    name: mariadb_mariadb_net
    external: true

services:
  # 1. Container PHP-FPM (Mesin PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-boilerplate-app
    restart: unless-stopped
    tty: true
    volumes:
      - '/home/fmi/docker-apps/9028-laravel-boilerplate/www-laravel-boilerplate:/var/www/html'
    networks:
      - mariadb_net

  # 2. Container Nginx (Web Server)
  webserver:
    image: nginx:alpine
    container_name: laravel-boilerplate-nginx
    restart: unless-stopped
    ports:
      - '9028:80' # Port dipindah ke Nginx
    volumes:
      - '/home/fmi/docker-apps/9028-laravel-boilerplate/www-laravel-boilerplate:/var/www/html'
      - './nginx/default.conf:/etc/nginx/conf.d/default.conf'
    depends_on:
      - app # Pastikan PHP jalan duluan sebelum Nginx
    networks:
      - mariadb_net

# Notes:
# Database Host in .env should be changed to the name of the database container in the 'mariadb_net' network.